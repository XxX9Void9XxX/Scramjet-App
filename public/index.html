<!doctype html>
<html>
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no"/>
	<title>Shadow Sites Plus | Proxy</title>

	<link rel="shortcut icon" content="favicon.webp" />

	<script src="/scram/scramjet.all.js"></script>
	<script src="/baremux/index.js"></script>

	<script src="register-sw.js" defer></script>
	<script src="search.js" defer></script>
	<script src="index.js" defer></script>

	<style>
		body {
			margin: 0;
			font-family: Arial, sans-serif;
			background: radial-gradient(circle at top, #1a0033, #000);
			color: #fff;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
		}

		.logo-wrapper {
			text-align: center;
			margin-bottom: 10px;
		}

		.logo {
			width: 90px;
			filter: drop-shadow(0 0 15px #a020f0);
		}

		h1 {
			margin: 10px 0;
			font-size: 2.2em;
			color: #c084ff;
			text-shadow: 0 0 10px #a020f0;
		}

		.desc {
			max-width: 600px;
			text-align: center;
			color: #ccc;
			margin-bottom: 20px;
		}

		form {
			display: flex;
			justify-content: center;
			width: 100%;
		}

		#sj-address {
			width: 60%;
			padding: 14px;
			border-radius: 10px;
			border: none;
			outline: none;
			font-size: 16px;
			background: #111;
			color: white;
			box-shadow: 0 0 10px #8000ff;
			transition: 0.2s;
		}

		#sj-address:focus {
			box-shadow: 0 0 20px #a020f0;
		}

		footer {
			position: absolute;
			bottom: 10px;
			text-align: center;
			font-size: 14px;
			color: #aaa;
		}

		footer a {
			color: #c084ff;
			text-decoration: none;
			margin: 0 10px;
		}

		footer a:hover {
			text-decoration: underline;
		}

		#sj-error {
			color: #ff4d4d;
			text-align: center;
		}

		#sj-error-code {
			color: #888;
			text-align: center;
		}
	</style>
</head>

<body>
	<div class="logo-wrapper">
		<img class="logo" src="sj.png" alt="Scramjet" />
		<h1>Shadow Sites Plus</h1>
	</div>

	<div class="desc">
		<p>
			Experimental proxy powered by Scramjet. Bypass restrictions, explore freely,
			and access the web without limits.
		</p>
	</div>

	<form id="sj-form">
		<input id="sj-search-engine" value="https://www.google.com/search?q=%s" type="hidden"/>
		<input id="sj-address" type="text" placeholder="Enter URL or search anything..." />
	</form>

	<div class="desc">
		<p id="sj-error"></p>
		<pre id="sj-error-code"></pre>
	</div>

	<footer>
		<div>
			<a href="https://github.com/MercuryWorkshop">MW</a>
			<a href="https://github.com/MercuryWorkshop/Scramjet-Demo">Source</a>
			<a href="credits.html">Credits</a>
		</div>
		<div>
			<span>SSP Proxy © 2026</span>
		</div>
	</footer>
</body>
</html>
