<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no"/>
<title>SSP Browser</title>

<link rel="shortcut icon" content="favicon.webp" />

<!-- ORIGINAL SCRAMJET SYSTEM (kept intact) -->
<script src="/scram/scramjet.all.js"></script>
<script src="/baremux/index.js"></script>

<script src="register-sw.js" defer></script>
<script src="search.js" defer></script>
<script src="index.js" defer></script>

<style>
body {
	margin: 0;
	font-family: Arial, sans-serif;
	background: #0a0014;
	color: white;
	height: 100vh;
	display: flex;
	flex-direction: column;
}

/* TOP BAR (browser style) */
.topbar {
	display: flex;
	align-items: center;
	gap: 8px;
	padding: 8px;
	background: linear-gradient(90deg, #120024, #1d0038);
	box-shadow: 0 0 15px #7a00ff;
}

/* BUTTONS */
button {
	background: #1a0033;
	border: 1px solid #7a00ff;
	color: white;
	padding: 6px 10px;
	border-radius: 6px;
	cursor: pointer;
}

button:hover {
	background: #2a0055;
}

/* ADDRESS BAR */
#sj-address {
	flex: 1;
	padding: 8px;
	border-radius: 8px;
	border: none;
	outline: none;
	background: #0f001f;
	color: white;
	box-shadow: 0 0 10px #7a00ff;
}

/* PROXY VIEW AREA */
.viewer {
	flex: 1;
	position: relative;
}

iframe {
	width: 100%;
	height: 100%;
	border: none;
	background: white;
}

/* LOADING TEXT */
#status {
	position: absolute;
	top: 10px;
	right: 10px;
	padding: 5px 10px;
	background: rgba(0,0,0,0.5);
	border: 1px solid #7a00ff;
	border-radius: 6px;
	font-size: 12px;
}
</style>
</head>

<body>

<!-- BROWSER TOP BAR -->
<div class="topbar">

	<button onclick="back()">←</button>
	<button onclick="forward()">→</button>
	<button onclick="reloadPage()">⟳</button>

	<!-- KEEP ORIGINAL SCRAMJET INPUT ID (IMPORTANT) -->
	<form id="sj-form" style="display:flex; flex:1;">
		<input id="sj-search-engine"
			value="https://www.google.com/search?q=%s"
			type="hidden" />

		<input id="sj-address"
			type="text"
			placeholder="Search or enter URL through proxy..." />
	</form>

	<button onclick="go()">Go</button>
</div>

<!-- VIEWER -->
<div class="viewer">
	<iframe id="frame"></iframe>
	<div id="status">Ready</div>
</div>

<script>
let historyStack = [];
let historyIndex = -1;

function setStatus(msg) {
	document.getElementById("status").innerText = msg;
}

// NORMALIZE INPUT
function normalize(input) {
	if (!input) return "";

	// search mode
	if (input.includes(" ") || !input.includes(".")) {
		return "https://www.google.com/search?q=" + encodeURIComponent(input);
	}

	if (!input.startsWith("http")) {
		return "https://" + input;
	}

	return input;
}

// CORE LOAD FUNCTION (PROXY AWARE HOOK)
function load(url, addHistory = true) {
	const frame = document.getElementById("frame");

	setStatus("Loading...");

	// Scramjet interception happens automatically via index.js + scramjet.all.js
	frame.src = url;

	if (addHistory) {
		historyStack = historyStack.slice(0, historyIndex + 1);
		historyStack.push(url);
		historyIndex++;
	}

	document.getElementById("sj-address").value = url;

	setTimeout(() => setStatus("Done"), 800);
}

function go() {
	const input = document.getElementById("sj-address").value;
	const url = normalize(input);
	load(url, true);
}

function back() {
	if (historyIndex > 0) {
		historyIndex--;
		load(historyStack[historyIndex], false);
	}
}

function forward() {
	if (historyIndex < historyStack.length - 1) {
		historyIndex++;
		load(historyStack[historyIndex], false);
	}
}

function reloadPage() {
	const frame = document.getElementById("frame");
	frame.src = frame.src;
}

// ENTER KEY SUPPORT
document.getElementById("sj-address").addEventListener("keydown", e => {
	if (e.key === "Enter") {
		e.preventDefault();
		go();
	}
});
</script>

</body>
</html>
