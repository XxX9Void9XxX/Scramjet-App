<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
		/>
		<title>Scramjet Browser</title>
		<link rel="shortcut icon" href="favicon.ico" />

		<script src="/scram/scramjet.all.js"></script>
		<script src="/baremux/index.js"></script>

		<link rel="stylesheet" href="index.css" />
		<script src="register-sw.js" defer></script>
		<script src="search.js" defer></script>
		<script src="index.js" defer></script>
	</head>

	<body>
		<div id="browser-shell" class="browser-shell">
			<header class="browser-topbar">
				<div class="window-controls" aria-hidden="true">
					<span class="dot dot-close"></span>
					<span class="dot dot-minimize"></span>
					<span class="dot dot-expand"></span>
				</div>

				<form id="sj-form" class="toolbar" autocomplete="off">
					<input
						id="sj-search-engine"
						value="https://www.google.com/search?q=%s"
						type="hidden"
					/>
					<button id="sj-back" class="toolbar-btn" type="button" title="Back">
						&#8592;
					</button>
					<button id="sj-forward" class="toolbar-btn" type="button" title="Forward">
						&#8594;
					</button>
					<button id="sj-reload" class="toolbar-btn" type="button" title="Reload">
						&#10227;
					</button>
					<input
						id="sj-address"
						type="text"
						placeholder="Search or enter a URL"
						aria-label="Address bar"
					/>
					<button class="go-btn" type="submit">Go</button>
				</form>
			</header>

			<main id="landing" class="landing">
				<div title="Scramjet Logo" class="logo-wrapper">
					<img class="logo" src="sj.png" alt="Scramjet" />
					<h1>Scramjet Browser</h1>
					<p>
						A browser-like interface powered by the Scramjet interception proxy.
						Enter a URL or search query in the address bar above.
					</p>
				</div>
			</main>

			<div class="error-area" aria-live="polite">
				<p id="sj-error"></p>
				<pre id="sj-error-code"></pre>
			</div>
		</div>
	</body>
</html>
