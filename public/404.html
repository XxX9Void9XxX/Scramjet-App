<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Not Found | Tempest</title>
  <style>
    :root {
      --black: #07070f;
      --dark-blue: #0f1b3a;
      --purple: #7a3df0;
      --light-purple: #b18bff;
      --white: #f7f7ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
      background: radial-gradient(circle at 15% 15%, rgba(122, 61, 240, 0.32) 0%, transparent 45%),
        radial-gradient(circle at 85% 90%, rgba(15, 27, 58, 0.85) 0%, transparent 50%),
        linear-gradient(160deg, var(--black) 0%, #0a0f28 50%, var(--dark-blue) 100%);
      padding: 1.25rem;
    }

    .card {
      width: min(92vw, 580px);
      background: rgba(10, 12, 25, 0.86);
      border: 1px solid rgba(177, 139, 255, 0.35);
      border-radius: 16px;
      text-align: center;
      padding: 2.25rem 1.4rem;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3rem);
      color: var(--light-purple);
      letter-spacing: 0.04em;
    }

    p {
      margin: 0.9rem 0 1.7rem;
      font-size: clamp(1rem, 2.8vw, 1.15rem);
      color: #d2d6ff;
    }

    .home-link {
      display: inline-block;
      text-decoration: none;
      color: var(--white);
      background: linear-gradient(135deg, var(--purple), #2d49b8);
      border: 1px solid rgba(255, 255, 255, 0.25);
      font-weight: 700;
      letter-spacing: 0.02em;
      border-radius: 999px;
      padding: 0.78rem 1.4rem;
      transition: transform 0.14s ease, box-shadow 0.14s ease;
    }

    .home-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(122, 61, 240, 0.35);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>404 — Not Found</h1>
    <p>The page you tried to visit does not exist.</p>
    <a class="home-link" href="/">Back to Home</a>
  </main>
</body>
</html>
